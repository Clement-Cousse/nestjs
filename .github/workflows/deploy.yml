name: Deploy to VPS

on:
  push:
    branches:
      - main # Déclenche la CI/CD uniquement lors d'un push sur main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executer les commandes de déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Se déplacer dans le dossier du projet sur le VPS
            cd /var/www/mairie/nestjs

            # 2. Récupérer la dernière version du code (Assure-toi d'avoir configuré git sur le VPS)
            git pull origin main

            # 3. Re-builder uniquement les conteneurs qui ont changé (NestJS / NextJS)
            # Le flag --no-deps évite de recréer MySQL inutilement
            docker compose up -d --build backend frontend

            # 4. Nettoyer les anciennes images Docker obsolètes pour économiser l'espace du VPS
            docker image prune -f